<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>就活戦闘力＆適性診断</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; padding: 20px; background-color: #f4f7f6; color: #333; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { font-size: 22px; text-align: center; color: #ff6b6b; margin-bottom: 20px; }
        label { display: block; margin-top: 15px; font-weight: bold; font-size: 14px; }
        select, input[type="text"] { width: 100%; padding: 12px; margin-top: 8px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; background-color: #ff6b6b; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; margin-top: 25px; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #ff4c4c; }
        #result-area { display: none; margin-top: 20px; padding: 20px; background-color: #fff0f0; border-radius: 10px; border: 2px solid #ff6b6b; }
        .hidden { display: none; }
        .tag { display: inline-block; background-color: #ff6b6b; color: white; padding: 5px 10px; border-radius: 20px; font-size: 14px; margin-bottom: 10px;}
        a.btn-link { display: block; text-align: center; background-color: #00c300; color: white; padding: 12px; text-decoration: none; border-radius: 8px; font-weight: bold; margin-top: 10px;}
    </style>
</head>
<body>

<div class="container" id="form-container">
    <h1>📝 1分でわかる！就活適性診断</h1>
    <form id="diagnosis-form">
        <label>紹介者</label>
        <select id="introducer">
            <option value="">選択してください</option>
            <option value="福島仁史">福島仁史</option>
            <option value="尾田健槙">尾田健槙</option>
            <!-- 必要に応じてチアフルメンバーを追加してください -->
        </select>

        <label>お名前</label>
        <input type="text" id="name" required placeholder="例：チアフル 太郎">

        <label>就活の進捗</label>
        <select id="progress">
            <option value="">選択してください</option>
            <option value="まだ何もしていない">まだ何もしていない</option>
            <option value="自己分析・業界研究中">自己分析・業界研究中</option>
            <option value="インターン・選考参加中">インターン・選考参加中</option>
        </select>

        <label>一番の不安</label>
        <select id="anxiety">
            <option value="">選択してください</option>
            <option value="何から始めればいいかわからない">何から始めればいいかわからない</option>
            <option value="ガクチカがない">ガクチカがない</option>
            <option value="面接が不安">面接が不安</option>
            <option value="やりたいことがない">自己分析が浅い</option>
        </select>

        <label>ガクチカの有無</label>
        <select id="gakuchika_exist" onchange="toggleGakuchikaDetail()">
            <option value="">選択してください</option>
            <option value="ある">ある</option>
            <option value="ない">ない</option>
        </select>

        <!-- ガクチカが「ある」人だけに表示される魔法の項目 -->
        <div id="gakuchika-detail-area" class="hidden">
            <label>ガクチカ詳細（簡潔に）</label>
            <input type="text" id="gakuchika_detail" placeholder="例：カフェのアルバイトで新人育成">
        </div>

        <label>【事業軸】どんな価値を提供したい？</label>
        <select id="axis_business">
            <option value="">選択してください</option>
            <option value="社会課題を解決したい">社会課題を解決したい</option>
            <option value="直接的な影響を与え感謝されたい">直接的な影響を与え感謝されたい</option>
            <option value="その他・まだわからない">その他・まだわからない</option>
        </select>

        <label>【環境・社風軸】どんな環境で働きたい？</label>
        <select id="axis_environment">
            <option value="">選択してください</option>
            <option value="突き抜けて稼ぎたい・上を目指したい">突き抜けて稼ぎたい・上を目指したい</option>
            <option value="働きやすさや人の良さを重視したい">働きやすさや人の良さを重視したい</option>
            <option value="大手企業や安定性を重視したい">大手企業や安定性を重視したい</option>
            <option value="その他・まだわからない">その他・まだわからない</option>
        </select>

        <button type="button" onclick="submitForm()">診断結果を見る</button>
    </form>
</div>

<!-- 診断結果表示エリア -->
<div class="container" id="result-area">
    <h2>🎉 診断完了！</h2>
    <span class="tag" id="res-tag"></span>
    
    <p><strong>🏢 あなたにおすすめの企業</strong><br><span id="res-company" style="white-space: pre-wrap; line-height: 1.6;"></span></p>
    
    <p><strong>📅 おすすめの直近イベント</strong><br><span id="res-event" style="white-space: pre-wrap; line-height: 1.6;"></span></p>
    
    <p><strong>💬 担当CAの面談予約</strong></p>
    <a href="#" id="res-url" target="_blank" class="btn-link">面談を予約する</a>
</div>

<script>
    // スプレッドシートと連携するAPI URL
    const API_URL = "https://script.google.com/macros/s/AKfycbwEQ_wLXJblOShr0Y_IZLgfBFW0R4-F5-x8cenOJN0SXHF4aaXMLXXhuKoCh-52428p/exec";

    // ガクチカ詳細欄の出し分け
    function toggleGakuchikaDetail() {
        const exist = document.getElementById("gakuchika_exist").value;
        const detailArea = document.getElementById("gakuchika-detail-area");
        if (exist === "ある") {
            detailArea.classList.remove("hidden");
        } else {
            detailArea.classList.add("hidden");
        }
    }

    // 送信処理
    function submitForm() {
        const data = {
            introducer: document.getElementById("introducer").value,
            name: document.getElementById("name").value,
            progress: document.getElementById("progress").value,
            anxiety: document.getElementById("anxiety").value,
            gakuchika_exist: document.getElementById("gakuchika_exist").value,
            gakuchika_detail: document.getElementById("gakuchika_detail").value,
            axis_business: document.getElementById("axis_business").value,
            axis_environment: document.getElementById("axis_environment").value
        };

        // ボタンをローディング状態に
        const btn = document.querySelector("button");
        btn.innerText = "診断中...（数秒お待ちください）";
        btn.disabled = true;

        fetch(API_URL, {
            method: "POST",
            body: JSON.stringify(data)
        })
        .then(response => response.json())
        .then(result => {
            if(result.status === "success") {
                // フォームを隠して結果を表示
                document.getElementById("form-container").classList.add("hidden");
                document.getElementById("result-area").style.display = "block";
                
                document.getElementById("res-tag").innerText = result.tag;
                document.getElementById("res-company").innerText = result.company;
                document.getElementById("res-event").innerText = result.event;
                document.getElementById("res-url").href = result.url;
            } else {
                alert("エラーが発生しました。");
                btn.innerText = "診断結果を見る";
                btn.disabled = false;
            }
        })
        .catch(error => {
            console.error("Error:", error);
            alert("通信エラーが発生しました。");
            btn.innerText = "診断結果を見る";
            btn.disabled = false;
        });
    }
</script>

</body>
</html>

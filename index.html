<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>就活戦闘力＆適性診断</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    
    <style>
        body { font-family: 'Noto Sans JP', sans-serif; padding: 20px 15px; background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%); background-attachment: fixed; color: #333; line-height: 1.6; margin: 0;}
        .container { max-width: 500px; margin: 0 auto; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); padding: 35px 25px; border-radius: 20px; box-shadow: 0 10px 40px rgba(255, 107, 107, 0.15); border: 1px solid rgba(255, 255, 255, 0.5);}
        h1 { font-size: 24px; text-align: center; color: #2c3e50; margin-bottom: 5px; font-weight: 700;}
        .subtitle { text-align: center; font-size: 13px; color: #ff6b6b; margin-bottom: 25px; font-weight: 600;}
        .section-title { font-size: 17px; color: #2c3e50; margin-top: 35px; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; font-weight: 700; background: rgba(255, 107, 107, 0.1); padding: 10px 15px; border-radius: 10px;}
        .section-title .material-symbols-outlined { color: #ff6b6b; }
        hr { border: none; border-top: 2px dashed rgba(255, 107, 107, 0.4); margin: 30px 0; }
        label { display: flex; align-items: center; gap: 8px; margin-top: 20px; font-weight: 600; font-size: 14px; color: #4a5568;}
        label .material-symbols-outlined { font-size: 18px; color: #a0aec0;}
        select, input[type="text"] { width: 100%; padding: 15px 16px; margin-top: 8px; border: 2px solid #e2e8f0; border-radius: 12px; box-sizing: border-box; font-size: 15px; font-family: 'Noto Sans JP', sans-serif; background-color: rgba(255, 255, 255, 0.9); color: #2d3748; transition: all 0.3s ease; -webkit-appearance: none;}
        select { background-image: url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23a0aec0%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E'); background-repeat: no-repeat; background-position: right 15px top 50%; background-size: 12px auto;}
        select:focus, input[type="text"]:focus { outline: none; border-color: #ff6b6b; box-shadow: 0 0 0 4px rgba(255, 107, 107, 0.15); background-color: #ffffff;}
        button { width: 100%; padding: 18px; background: linear-gradient(135deg, #ff6b6b 0%, #ff4c4c 100%); color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: 700; letter-spacing: 2px; margin-top: 40px; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 10px 20px rgba(255, 107, 107, 0.3); display: flex; align-items: center; justify-content: center; gap: 10px;}
        button:hover { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(255, 107, 107, 0.4); filter: brightness(1.1);}
        button:disabled { background: #cbd5e0; box-shadow: none; cursor: not-allowed; transform: none;}
        #result-area { display: none; margin-top: 20px; padding: 35px 25px; background: rgba(255, 255, 255, 0.95); border-radius: 20px; border: 2px solid #ff6b6b; box-shadow: 0 15px 35px rgba(255, 107, 107, 0.2);}
        .hidden { display: none; }
        .tag { display: inline-block; background: linear-gradient(135deg, #ff6b6b, #ff4c4c); color: white; padding: 8px 18px; border-radius: 25px; font-size: 15px; font-weight: bold; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(255, 107, 107, 0.3);}
        
        .ai-reason-box { background: #fff5f5; border: 1px solid #fed7d7; border-radius: 12px; padding: 18px; margin-bottom: 25px; font-size: 14.5px; color: #c53030; line-height: 1.7; font-weight: 600;}
        .ai-reason-box strong { color: #e53e3e; display: flex; align-items: center; gap: 5px; margin-bottom: 8px; font-size: 16px;}
        
        .result-box { background: #f8fafc; border-radius: 12px; padding: 20px; margin-bottom: 20px; border-left: 4px solid #ff6b6b;}
        .result-box strong { display: flex; align-items: center; gap: 8px; color: #ff6b6b; margin-bottom: 15px; font-size: 16px;}
        .result-box p { margin: 0; color: #2d3748; line-height: 1.7; font-size: 15px;}

        /* 🏢 企業カードの新しいデザイン */
        .company-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-left: 4px solid #ff6b6b;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .company-card:last-child {
            margin-bottom: 0;
        }
        .company-card h3 {
            margin: 0 0 10px 0;
            font-size: 16.5px;
            color: #2c3e50;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .company-card p {
            margin: 0;
            font-size: 13.5px;
            color: #4a5568;
            line-height: 1.6;
            background: #f8fafc;
            padding: 12px;
            border-radius: 6px;
        }

        a.btn-link { display: flex; align-items: center; justify-content: center; gap: 8px; background: linear-gradient(135deg, #00c300, #00a800); color: white; padding: 18px; text-decoration: none; border-radius: 12px; font-weight: bold; font-size: 17px; margin-top: 10px; box-shadow: 0 8px 20px rgba(0, 195, 0, 0.3); transition: all 0.3s ease;}
        a.btn-link:hover { transform: translateY(-3px); box-shadow: 0 12px 25px rgba(0, 195, 0, 0.4); filter: brightness(1.1);}
    </style>
</head>
<body>

<div class="container" id="form-container">
    <h1>就活適性診断</h1>
    <div class="subtitle">AIがあなたの強みを分析し、最適な企業をご提案します</div>

    <form id="diagnosis-form">
        <!-- ▼ ブロック1：基本情報 -->
        <div class="section-title"><span class="material-symbols-outlined">person</span>基本情報</div>
        <label><span class="material-symbols-outlined">badge</span>紹介者</label>
        <input type="text" id="introducer" placeholder="例：チアフル 太郎（友達の名前など）">
        <label><span class="material-symbols-outlined">face</span>氏名</label>
        <input type="text" id="name" placeholder="例：チアフル 次郎">
        <label><span class="material-symbols-outlined">school</span>大学名</label>
        <input type="text" id="university" placeholder="例：佐賀大学">
        <label><span class="material-symbols-outlined">menu_book</span>学部</label>
        <input type="text" id="faculty" placeholder="例：経済学部">
        <label><span class="material-symbols-outlined">sports_baseball</span>スポーツ・部活経験</label>
        <select id="club">
            <option value="" disabled selected>選択してください</option>
            <option value="スポーツ経験6年以上（体育会系など）">スポーツ経験6年以上（体育会系など）</option>
            <option value="サークル・文化系部活">サークル・文化系部活</option>
            <option value="なし">なし</option>
        </select>
        <hr>

        <!-- ▼ ブロック2：現状確認 -->
        <div class="section-title"><span class="material-symbols-outlined">analytics</span>現状確認</div>
        <label><span class="material-symbols-outlined">trending_up</span>就活の進捗</label>
        <select id="progress">
            <option value="" disabled selected>選択してください</option>
            <option value="まだ何もしていない">まだ何もしていない</option>
            <option value="自己分析・業界研究中">自己分析・業界研究中</option>
            <option value="インターン・選考参加中">インターン・選考参加中</option>
        </select>
        <label><span class="material-symbols-outlined">sentiment_dissatisfied</span>一番の不安</label>
        <select id="anxiety">
            <option value="" disabled selected>選択してください</option>
            <option value="自己分析が浅い">自己分析が浅い</option>
            <option value="ガクチカがない">ガクチカがない</option>
            <option value="面接が不安">面接が不安</option>
            <option value="何から始めればいいかわからない">何から始めればいいかわからない</option>
        </select>
        <label><span class="material-symbols-outlined">history_edu</span>ガクチカの有無</label>
        <select id="gakuchika_exist" onchange="toggleGakuchikaDetail()">
            <option value="" disabled selected>選択してください</option>
            <option value="ある">ある</option>
            <option value="ない">ない</option>
        </select>
        <div id="gakuchika-detail-area" class="hidden">
            <label><span class="material-symbols-outlined">edit_note</span>ガクチカ詳細（簡潔に）</label>
            <input type="text" id="gakuchika_detail" placeholder="例：カフェのアルバイトで新人育成">
        </div>
        <hr>

        <!-- ▼ ブロック3：志向性 -->
        <div class="section-title"><span class="material-symbols-outlined">explore</span>志向性・価値観</div>
        <label><span class="material-symbols-outlined">handshake</span>【事業軸】どんな価値を提供したい？</label>
        <select id="axis_business">
            <option value="" disabled selected>選択してください</option>
            <option value="社会課題を解決したい">社会課題を解決したい</option>
            <option value="直接的な影響を与え感謝されたい">直接的な影響を与え感謝されたい</option>
            <option value="その他・まだわからない">その他・まだわからない</option>
        </select>
        <label><span class="material-symbols-outlined">domain</span>【環境・社風軸】どんな環境で働きたい？</label>
        <select id="axis_environment">
            <option value="" disabled selected>選択してください</option>
            <option value="突き抜けて稼ぎたい・上を目指したい">突き抜けて稼ぎたい・上を目指したい</option>
            <option value="働きやすさや人の良さを重視したい">働きやすさや人の良さを重視したい</option>
            <option value="大手企業や安定性を重視したい">大手企業や安定性を重視したい</option>
            <option value="その他・まだわからない">その他・まだわからない</option>
        </select>
        <label><span class="material-symbols-outlined">location_on</span>【勤務地軸】将来はどこで働きたい？</label>
        <select id="axis_location">
            <option value="" disabled selected>選択してください</option>
            <option value="東京などの主要都市">東京などの主要都市</option>
            <option value="地元や地方">地元や地方</option>
            <option value="どこでもいい・フルリモート">どこでもいい・フルリモート</option>
        </select>
        <label><span class="material-symbols-outlined">work</span>【働き方軸】どんなスタイルで働きたい？</label>
        <select id="axis_workstyle">
            <option value="" disabled selected>選択してください</option>
            <option value="若手から裁量を持ってバリバリ">若手から裁量を持ってバリバリ</option>
            <option value="プライベートやワークライフバランスも充実させたい">プライベートやワークライフバランスも充実させたい</option>
            <option value="トレンドや最先端の環境で華やかに働きたい">トレンドや最先端の環境で華やかに働きたい</option>
        </select>
        <label><span class="material-symbols-outlined">military_tech</span>【職種・スキル軸】将来どんな力を身につけたい？</label>
        <select id="axis_skill">
            <option value="" disabled selected>選択してください</option>
            <option value="営業力・交渉力を磨きたい">営業力・交渉力を磨きたい</option>
            <option value="企画や事業立ち上げがしたい">企画や事業立ち上げがしたい</option>
            <option value="ITや専門スキルを身につけたい">ITや専門スキルを身につけたい</option>
            <option value="グローバルに活躍したい">グローバルに活躍したい</option>
            <option value="その他・まだわからない">その他・まだわからない</option>
        </select>

        <button type="button" onclick="submitForm()">
            <span class="material-symbols-outlined">magic_button</span>診断結果を見る
        </button>
    </form>
</div>

<!-- 診断結果表示エリア -->
<div class="container" id="result-area">
    <h2 style="color: #2c3e50; text-align: center; margin-top: 0; margin-bottom: 20px;">🎉 診断完了！</h2>
    <div style="text-align: center;"><span class="tag" id="res-tag"></span></div>
    
    <div class="ai-reason-box">
        <strong><span class="material-symbols-outlined">psychology</span> AI分析コメント</strong>
        <p id="res-reason" style="margin: 0;"></p>
    </div>

    <!-- 🌟【UI改善】ここをカード型出力用に変更 -->
    <div class="result-box">
        <strong><span class="material-symbols-outlined">apartment</span>あなたにおすすめの企業</strong>
        <div id="res-company-container"></div>
    </div>
    
    <div class="result-box">
        <strong><span class="material-symbols-outlined">event</span>おすすめの直近イベント</strong>
        <p id="res-event" style="white-space: pre-wrap;"></p>
    </div>
    
    <div style="margin: 30px 0 10px 0;">
        <p style="text-align: center; color: #2c3e50; font-weight: bold; margin-bottom: 10px;">💬 担当CAの面談予約</p>
        <a href="#" id="res-url" target="_blank" class="btn-link">
            <span class="material-symbols-outlined">forum</span>LINEで面談を予約する
        </a>
    </div>
</div>

<script>
    // 💡【重要】GASのウェブアプリURL
    const API_URL = "https://script.google.com/macros/s/AKfycbwEQ_wLXJblOShr0Y_IZLgfBFW0R4-F5-x8cenOJN0SXHF4aaXMLXXhuKoCh-52428p/exec";

    function toggleGakuchikaDetail() {
        const exist = document.getElementById("gakuchika_exist").value;
        const detailArea = document.getElementById("gakuchika-detail-area");
        if (exist === "ある") {
            detailArea.classList.remove("hidden");
        } else {
            detailArea.classList.add("hidden");
            document.getElementById("gakuchika_detail").value = ""; 
        }
    }

    function submitForm() {
        const introducer = document.getElementById("introducer").value.trim();
        const name = document.getElementById("name").value.trim();
        const university = document.getElementById("university").value.trim();
        const faculty = document.getElementById("faculty").value.trim();
        const club = document.getElementById("club").value;
        const progress = document.getElementById("progress").value;
        const anxiety = document.getElementById("anxiety").value;
        const gakuchika_exist = document.getElementById("gakuchika_exist").value;
        const gakuchika_detail = document.getElementById("gakuchika_detail").value.trim();
        const axis_business = document.getElementById("axis_business").value;
        const axis_environment = document.getElementById("axis_environment").value;
        const axis_location = document.getElementById("axis_location").value;
        const axis_workstyle = document.getElementById("axis_workstyle").value;
        const axis_skill = document.getElementById("axis_skill").value;

        if (!introducer || !name || !university || !faculty || !club || !progress || !anxiety || !gakuchika_exist || !axis_business || !axis_environment || !axis_location || !axis_workstyle || !axis_skill) {
            alert("⚠️ 未入力の項目があります。すべての項目を選択・入力してください！");
            return;
        }
        if (gakuchika_exist === "ある" && !gakuchika_detail) {
            alert("⚠️ ガクチカ詳細を簡潔に入力してください！");
            return;
        }

        const data = {
            introducer: introducer, name: name, university: university, faculty: faculty,
            club: club, progress: progress, anxiety: anxiety, gakuchika_exist: gakuchika_exist,
            gakuchika_detail: gakuchika_detail, axis_business: axis_business, 
            axis_environment: axis_environment, axis_location: axis_location, 
            axis_workstyle: axis_workstyle, axis_skill: axis_skill
        };

        const btn = document.querySelector("button");
        btn.innerHTML = '<span class="material-symbols-outlined">hourglass_empty</span>診断中...';
        btn.disabled = true;

        fetch(API_URL, {
            method: "POST",
            body: JSON.stringify(data)
        })
        .then(response => response.json())
        .then(result => {
            if(result.status === "success") {
                document.getElementById("form-container").classList.add("hidden");
                document.getElementById("result-area").style.display = "block";
                
                let displayTag = result.tag;
                if (displayTag === "初心者 / Fパケ層") {
                    displayTag = "ポテンシャル・人物重視"; 
                }
                document.getElementById("res-tag").innerText = displayTag;
                document.getElementById("res-reason").innerText = result.reason;
                
                const companyArea = document.getElementById("res-company-container");
                companyArea.innerHTML = ""; 
                
                let compText = Array.isArray(result.company) ? String(result.company || "") : String(result.company || "");
                
                if (compText && compText !== "まずはチアフルキャリア面談で一緒に探そう！") {
                    const companies = compText.split('\n'); 
                    companies.forEach(comp => {
                        if (!comp.trim()) return;
                        
                        const parts = comp.split('：');
                        const compName = parts ? parts.trim() : "";
                        const compDesc = parts.slice(1).join('：').trim(); 

                        const card = document.createElement("div");
                        card.className = "company-card";

                        const nameEl = document.createElement("h3");
                        nameEl.innerHTML = `<span class="material-symbols-outlined" style="font-size: 20px; color: #ff6b6b;">domain</span>${compName}`;
                        card.appendChild(nameEl);

                        if (compDesc) {
                            const descEl = document.createElement("p");
                            descEl.innerText = compDesc;
                            card.appendChild(descEl);
                        }
                        
                        companyArea.appendChild(card);
                    });
                } else {
                    companyArea.innerText = compText || "おすすめ企業が見つかりませんでした。";
                }

                let eventText = Array.isArray(result.event) ? String(result.event || "") : String(result.event || "");
                let urlText = Array.isArray(result.url) ? String(result.url || "") : String(result.url || "");
                
                document.getElementById("res-event").innerText = eventText;
                document.getElementById("res-url").href = urlText;
                
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                alert("エラーが発生しました。");
                btn.innerHTML = '<span class="material-symbols-outlined">magic_button</span>診断結果を見る';
                btn.disabled = false;
            }
        })
        .catch(error => {
            console.error("Error:", error);
            alert("通信エラーが発生しました。設定（実行承認や全員アクセスの権限）をご確認ください。");
            btn.innerHTML = '<span class="material-symbols-outlined">magic_button</span>診断結果を見る';
            btn.disabled = false;
        });
    }
</script>

</body>
</html>

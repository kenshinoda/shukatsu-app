<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>就活戦闘力＆適性診断</title>
    <style>
        /* 全体のベース設定 */
        body { 
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif; 
            padding: 20px 15px; 
            background-color: #f0f4f8; 
            color: #333; 
            line-height: 1.6;
        }
        /* メインコンテナ（白いカード部分） */
        .container { 
            max-width: 500px; 
            margin: 0 auto; 
            background: #ffffff; 
            padding: 35px 25px; 
            border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08); 
        }
        /* タイトル・見出し */
        h1 { 
            font-size: 22px; 
            text-align: center; 
            color: #2c3e50; 
            margin-bottom: 10px; 
            font-weight: 700;
        }
        h1 span { color: #ff6b6b; }
        .section-title { 
            font-size: 16px; 
            color: #2c3e50; 
            margin-top: 35px; 
            margin-bottom: 15px; 
            padding-left: 12px;
            border-left: 4px solid #ff6b6b; 
            font-weight: 700;
        }
        hr { 
            border: none; 
            border-top: 1px solid #e1e5eb; 
            margin: 35px 0; 
        }
        /* フォームのラベルと入力欄 */
        label { 
            display: block; 
            margin-top: 20px; 
            font-weight: 600; 
            font-size: 13px; 
            color: #5a6a7c;
        }
        select, input[type="text"] { 
            width: 100%; 
            padding: 14px 15px; 
            margin-top: 8px; 
            border: 1px solid #cfd9e0; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 15px; 
            background-color: #f8fafc; 
            color: #333;
            transition: all 0.3s ease;
            -webkit-appearance: none;
        }
        /* 選択欄の矢印デザイン */
        select {
            background-image: url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23999%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E');
            background-repeat: no-repeat;
            background-position: right 15px top 50%;
            background-size: 12px auto;
        }
        /* タップ（フォーカス）時のエフェクト */
        select:focus, input[type="text"]:focus {
            outline: none;
            border-color: #ff6b6b;
            box-shadow: 0 0 0 4px rgba(255, 107, 107, 0.15);
            background-color: #ffffff;
        }
        /* 送信ボタン */
        button { 
            width: 100%; 
            padding: 18px; 
            background: linear-gradient(135deg, #ff6b6b, #ff4c4c);
            color: white; 
            border: none; 
            border-radius: 10px; 
            font-size: 16px; 
            font-weight: bold; 
            letter-spacing: 1px;
            margin-top: 40px; 
            cursor: pointer; 
            transition: all 0.3s ease; 
            box-shadow: 0 6px 15px rgba(255, 107, 107, 0.3);
        }
        button:hover { 
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 107, 107, 0.4);
        }
        button:active {
            transform: translateY(1px);
            box-shadow: 0 4px 10px rgba(255, 107, 107, 0.3);
        }
        button:disabled {
            background: #ccc;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }
        /* 結果表示エリア */
        #result-area { 
            display: none; 
            margin-top: 20px; 
            padding: 30px 25px; 
            background-color: #fffafafa; 
            border-radius: 16px; 
            border: 2px solid #ff6b6b; 
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.1);
        }
        .hidden { display: none; }
        .tag { 
            display: inline-block; 
            background-color: #ff6b6b; 
            color: white; 
            padding: 6px 14px; 
            border-radius: 20px; 
            font-size: 14px; 
            font-weight: bold;
            margin-bottom: 15px;
            box-shadow: 0 3px 8px rgba(255, 107, 107, 0.3);
        }
        a.btn-link { 
            display: block; 
            text-align: center; 
            background: linear-gradient(135deg, #00c300, #00a800); 
            color: white; 
            padding: 16px; 
            text-decoration: none; 
            border-radius: 10px; 
            font-weight: bold; 
            font-size: 16px;
            margin-top: 15px;
            box-shadow: 0 6px 15px rgba(0, 195, 0, 0.2);
            transition: all 0.3s ease;
        }
        a.btn-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 195, 0, 0.3);
        }
    </style>
</head>
<body>

<div class="container" id="form-container">
    <h1>📝 1分でわかる！<span>就活適性診断</span></h1>
    <form id="diagnosis-form">
        
        <!-- ▼ ブロック1：基本情報 -->
        <h3 class="section-title">基本情報</h3>
        <label>紹介者</label>
        <select id="introducer">
            <option value="" disabled selected>選択してください</option>
            <option value="福島仁史">福島仁史</option>
            <option value="尾田健槙">尾田健槙</option>
            <!-- 他のメンバーもここに追加してください -->
        </select>

        <label>氏名</label>
        <input type="text" id="name" placeholder="例：チアフル 太郎">

        <label>大学名</label>
        <input type="text" id="university" placeholder="例：佐賀大学">

        <label>学部</label>
        <input type="text" id="faculty" placeholder="例：経済学部">

        <label>スポーツ・部活経験</label>
        <select id="club">
            <option value="" disabled selected>選択してください</option>
            <option value="スポーツ経験6年以上（体育会系など）">スポーツ経験6年以上（体育会系など）</option>
            <option value="サークル・文化系部活">サークル・文化系部活</option>
            <option value="なし">なし</option>
        </select>

        <hr>

        <!-- ▼ ブロック2：現状確認 -->
        <h3 class="section-title">現状確認</h3>
        <label>就活の進捗</label>
        <select id="progress">
            <option value="" disabled selected>選択してください</option>
            <option value="まだ何もしていない">まだ何もしていない</option>
            <option value="自己分析・業界研究中">自己分析・業界研究中</option>
            <option value="インターン・選考参加中">インターン・選考参加中</option>
        </select>

        <label>一番の不安</label>
        <select id="anxiety">
            <option value="" disabled selected>選択してください</option>
            <option value="自己分析が浅い">自己分析が浅い</option>
            <option value="ガクチカがない">ガクチカがない</option>
            <option value="面接が不安">面接が不安</option>
            <option value="何から始めればいいかわからない">何から始めればいいかわからない</option>
        </select>

        <label>ガクチカの有無</label>
        <select id="gakuchika_exist" onchange="toggleGakuchikaDetail()">
            <option value="" disabled selected>選択してください</option>
            <option value="ある">ある</option>
            <option value="ない">ない</option>
        </select>

        <div id="gakuchika-detail-area" class="hidden">
            <label>ガクチカ詳細（簡潔に）</label>
            <input type="text" id="gakuchika_detail" placeholder="例：カフェのアルバイトで新人育成">
        </div>

        <hr>

        <!-- ▼ ブロック3：志向性 -->
        <h3 class="section-title">志向性・価値観</h3>
        <label>【事業軸】どんな価値を提供したい？</label>
        <select id="axis_business">
            <option value="" disabled selected>選択してください</option>
            <option value="社会課題を解決したい">社会課題を解決したい</option>
            <option value="直接的な影響を与え感謝されたい">直接的な影響を与え感謝されたい</option>
            <option value="その他・まだわからない">その他・まだわからない</option>
        </select>

        <label>【環境・社風軸】どんな環境で働きたい？</label>
        <select id="axis_environment">
            <option value="" disabled selected>選択してください</option>
            <option value="突き抜けて稼ぎたい・上を目指したい">突き抜けて稼ぎたい・上を目指したい</option>
            <option value="働きやすさや人の良さを重視したい">働きやすさや人の良さを重視したい</option>
            <option value="大手企業や安定性を重視したい">大手企業や安定性を重視したい</option>
            <option value="その他・まだわからない">その他・まだわからない</option>
        </select>

        <label>【勤務地軸】将来はどこで働きたい？</label>
        <select id="axis_location">
            <option value="" disabled selected>選択してください</option>
            <option value="東京などの主要都市">東京などの主要都市</option>
            <option value="地元や地方">地元や地方</option>
            <option value="どこでもいい・フルリモート">どこでもいい・フルリモート</option>
        </select>

        <label>【働き方軸】どんなスタイルで働きたい？</label>
        <select id="axis_workstyle">
            <option value="" disabled selected>選択してください</option>
            <option value="若手から裁量を持ってバリバリ">若手から裁量を持ってバリバリ</option>
            <option value="プライベートやワークライフバランスも充実させたい">プライベートやワークライフバランスも充実させたい</option>
            <option value="トレンドや最先端の環境で華やかに働きたい">トレンドや最先端の環境で華やかに働きたい</option>
        </select>

        <label>【職種・スキル軸】将来どんな力を身につけたい？</label>
        <select id="axis_skill">
            <option value="" disabled selected>選択してください</option>
            <option value="営業力・交渉力を磨きたい">営業力・交渉力を磨きたい</option>
            <option value="企画や事業立ち上げがしたい">企画や事業立ち上げがしたい</option>
            <option value="ITや専門スキルを身につけたい">ITや専門スキルを身につけたい</option>
            <option value="グローバルに活躍したい">グローバルに活躍したい</option>
            <option value="その他・まだわからない">その他・まだわからない</option>
        </select>

        <button type="button" onclick="submitForm()">診断結果を見る</button>
    </form>
</div>

<!-- 診断結果表示エリア -->
<div class="container" id="result-area">
    <h2 style="color: #2c3e50; text-align: center; margin-bottom: 20px;">🎉 診断完了！</h2>
    <div style="text-align: center;"><span class="tag" id="res-tag"></span></div>
    
    <p style="color: #5a6a7c; font-size: 14px; margin-bottom: 5px;"><strong>🏢 あなたにおすすめの企業</strong></p>
    <p><span id="res-company" style="white-space: pre-wrap; line-height: 1.6; color: #333;"></span></p>
    
    <div style="margin: 20px 0; border-top: 1px dashed #ff6b6b;"></div>

    <p style="color: #5a6a7c; font-size: 14px; margin-bottom: 5px;"><strong>📅 おすすめの直近イベント</strong></p>
    <p><span id="res-event" style="white-space: pre-wrap; line-height: 1.6; color: #333;"></span></p>
    
    <div style="margin: 25px 0 15px 0;">
        <p style="text-align: center; color: #2c3e50; font-weight: bold; margin-bottom: 5px;">💬 担当CAの面談予約</p>
        <a href="#" id="res-url" target="_blank" class="btn-link">LINEで面談を予約する</a>
    </div>
</div>

<script>
    // GASのAPI URL
    const API_URL = "https://script.google.com/macros/s/AKfycbwEQ_wLXJblOShr0Y_IZLgfBFW0R4-F5-x8cenOJN0SXHF4aaXMLXXhuKoCh-52428p/exec";

    function toggleGakuchikaDetail() {
        const exist = document.getElementById("gakuchika_exist").value;
        const detailArea = document.getElementById("gakuchika-detail-area");
        if (exist === "ある") {
            detailArea.classList.remove("hidden");
        } else {
            detailArea.classList.add("hidden");
            document.getElementById("gakuchika_detail").value = ""; 
        }
    }

    function submitForm() {
        const introducer = document.getElementById("introducer").value;
        const name = document.getElementById("name").value.trim();
        const university = document.getElementById("university").value.trim();
        const faculty = document.getElementById("faculty").value.trim();
        const club = document.getElementById("club").value;
        const progress = document.getElementById("progress").value;
        const anxiety = document.getElementById("anxiety").value;
        const gakuchika_exist = document.getElementById("gakuchika_exist").value;
        const gakuchika_detail = document.getElementById("gakuchika_detail").value.trim();
        const axis_business = document.getElementById("axis_business").value;
        const axis_environment = document.getElementById("axis_environment").value;
        const axis_location = document.getElementById("axis_location").value;
        const axis_workstyle = document.getElementById("axis_workstyle").value;
        const axis_skill = document.getElementById("axis_skill").value;

        if (!introducer || !name || !university || !faculty || !club || !progress || !anxiety || !gakuchika_exist || !axis_business || !axis_environment || !axis_location || !axis_workstyle || !axis_skill) {
            alert("⚠️ 未入力の項目があります。すべての項目を選択・入力してください！");
            return;
        }

        if (gakuchika_exist === "ある" && !gakuchika_detail) {
            alert("⚠️ ガクチカ詳細を簡潔に入力してください！");
            return;
        }

        const data = {
            introducer: introducer,
            name: name,
            university: university,
            faculty: faculty,
            club: club,
            progress: progress,
            anxiety: anxiety,
            gakuchika_exist: gakuchika_exist,
            gakuchika_detail: gakuchika_detail,
            axis_business: axis_business,
            axis_environment: axis_environment,
            axis_location: axis_location,
            axis_workstyle: axis_workstyle,
            axis_skill: axis_skill
        };

        const btn = document.querySelector("button");
        btn.innerText = "診断中...（数秒お待ちください）";
        btn.disabled = true;

        fetch(API_URL, {
            method: "POST",
            body: JSON.stringify(data)
        })
        .then(response => response.json())
        .then(result => {
            if(result.status === "success") {
                document.getElementById("form-container").classList.add("hidden");
                document.getElementById("result-area").style.display = "block";
                
                document.getElementById("res-tag").innerText = result.tag;
                document.getElementById("res-company").innerText = result.company;
                document.getElementById("res-event").innerText = result.event;
                document.getElementById("res-url").href = result.url;
                
                // スクロールを一番上に
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                alert("エラーが発生しました。");
                btn.innerText = "診断結果を見る";
                btn.disabled = false;
            }
        })
        .catch(error => {
            console.error("Error:", error);
            alert("通信エラーが発生しました。");
            btn.innerText = "診断結果を見る";
            btn.disabled = false;
        });
    }
</script>

</body>
</html>
